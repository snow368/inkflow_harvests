<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Safeguard for window.fetch assignment which might be attempted by some dependencies
      try {
        const originalFetch = window.fetch;
        const descriptor = Object.getOwnPropertyDescriptor(window, 'fetch');
        
        if (descriptor && descriptor.configurable) {
          Object.defineProperty(window, 'fetch', {
            configurable: true,
            enumerable: true,
            get: () => originalFetch,
            set: (val) => {
              console.warn('Attempted to overwrite window.fetch, ignoring.', val);
            }
          });
        } else {
          // If not configurable on window, try to define it on the prototype if possible
          try {
            Object.defineProperty(Window.prototype, 'fetch', {
              configurable: true,
              enumerable: true,
              get: () => originalFetch,
              set: (val) => {
                console.warn('Attempted to overwrite window.fetch on prototype, ignoring.', val);
              }
            });
          } catch (e) {
            // Last resort: try to just suppress the error if possible (not really possible in JS)
          }
        }
      } catch (e) {
        // Ignore errors in safeguarding
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
